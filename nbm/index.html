<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NBM Cycle Monitor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0c0e13;
    --surface: #141720;
    --surface2: #1a1e2a;
    --border: #252a3a;
    --text: #c8cdd8;
    --text-dim: #5a6275;
    --text-bright: #eef0f5;
    --green: #34d399;
    --green-bg: rgba(52, 211, 153, 0.08);
    --green-border: rgba(52, 211, 153, 0.25);
    --red: #f87171;
    --red-bg: rgba(248, 113, 113, 0.06);
    --red-border: rgba(248, 113, 113, 0.2);
    --amber: #fbbf24;
    --amber-bg: rgba(251, 191, 36, 0.08);
    --blue: #60a5fa;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 2rem 1rem;
  }

  .container { max-width: 720px; margin: 0 auto; }
  header { margin-bottom: 1.5rem; }

  h1 {
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--text-bright);
    letter-spacing: -0.02em;
  }

  h1 span { color: var(--text-dim); font-weight: 400; }

  .meta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
    color: var(--text-dim);
    margin-top: 0.5rem;
    line-height: 1.6;
  }

  .config-row {
    display: flex;
    gap: 0.5rem;
    align-items: center;
    margin-bottom: 1rem;
  }

  .config-input {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 0.4rem 0.6rem;
    border-radius: 4px;
    outline: none;
    flex: 1;
  }

  .config-input:focus { border-color: var(--blue); }

  .config-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem;
    color: var(--text-dim);
    white-space: nowrap;
  }

  .config-saved {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem;
    color: var(--green);
    opacity: 0;
    transition: opacity 0.3s;
  }

  .controls {
    display: flex;
    gap: 0.5rem;
    align-items: center;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
  }

  .date-input {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.85rem;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-bright);
    padding: 0.5rem 0.75rem;
    border-radius: 6px;
    outline: none;
  }

  .date-input:focus { border-color: var(--blue); }

  .btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.8rem;
    font-weight: 600;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 0.5rem 1rem;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.15s;
    user-select: none;
  }

  .btn:hover { background: var(--border); color: var(--text-bright); }
  .btn:active { transform: scale(0.97); }
  .btn.checking { opacity: 0.5; pointer-events: none; }

  .btn.active {
    background: var(--blue);
    border-color: var(--blue);
    color: var(--bg);
  }

  .btn-sm {
    font-size: 0.75rem;
    padding: 0.5rem 0.75rem;
  }

  .separator {
    width: 1px;
    height: 1.5rem;
    background: var(--border);
  }

  .summary {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.8rem;
    color: var(--text-dim);
    margin-left: auto;
  }

  .summary b { color: var(--green); font-weight: 600; }

  .cycles { display: flex; flex-direction: column; gap: 2px; }

  .cycle-row {
    display: grid;
    grid-template-columns: 2.5rem 1fr auto auto;
    align-items: center;
    gap: 0.75rem;
    padding: 0.7rem 1rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    transition: all 0.3s;
    opacity: 0;
    transform: translateY(6px);
  }

  .cycle-row.show { opacity: 1; transform: translateY(0); }
  .cycle-row.ready { background: var(--green-bg); border-color: var(--green-border); }
  .cycle-row.unavailable { background: var(--red-bg); border-color: var(--red-border); }

  .cycle-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
    font-weight: 600;
    color: var(--text-dim);
  }

  .cycle-info { display: flex; flex-direction: column; gap: 0.15rem; }

  .cycle-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--text-bright);
  }

  .cycle-init {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    color: var(--text-dim);
  }

  .cycle-times {
    display: flex;
    flex-direction: column;
    gap: 0.15rem;
    text-align: right;
  }

  .time-row {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem;
    color: var(--text-dim);
  }

  .time-row .val { color: var(--text); }
  .time-row .val.actual { color: var(--green); font-weight: 600; }

  .cycle-status {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.8rem;
    font-weight: 600;
    min-width: 5rem;
    text-align: right;
  }

  .cycle-status.ready { color: var(--green); }
  .cycle-status.unavailable { color: var(--red); }
  .cycle-status.checking { color: var(--text-dim); }
  .cycle-status.error { color: var(--red); }

  .dot {
    display: inline-block;
    width: 7px;
    height: 7px;
    border-radius: 50%;
    margin-right: 0.4rem;
    vertical-align: middle;
  }

  .dot.ready { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .dot.unavailable { background: var(--red); }

  .msg {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.8rem;
    color: var(--red);
    padding: 1rem;
  }

  .footer {
    margin-top: 2rem;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem;
    color: var(--text-dim);
    line-height: 1.6;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .checking-anim { animation: pulse 1s ease-in-out infinite; }

  .btn.checking::after {
    content: '';
    display: inline-block;
    width: 10px;
    height: 10px;
    border: 2px solid var(--text-dim);
    border-top-color: transparent;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    margin-left: 0.5rem;
    vertical-align: middle;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>NBM Cycle Monitor <span>/ NOMADS</span></h1>
    <div class="meta">
      <div>TMAX forecast availability</div>
      <div id="clock"></div>
    </div>
  </header>

  <div class="config-row">
    <span class="config-label">Worker:</span>
    <input type="text" class="config-input" id="workerUrl"
           placeholder="https://nbm-check.xxx.workers.dev">
    <span class="config-saved" id="savedMsg">saved</span>
  </div>

  <div class="controls">
    <button class="btn btn-sm" id="btnToday" onclick="setToday()">Today</button>
    <button class="btn btn-sm active" id="btnTomorrow" onclick="setTomorrow()">Tomorrow</button>
    <input type="date" class="date-input" id="targetDate">
    <div class="separator"></div>
    <button class="btn" id="checkBtn" onclick="runCheck()">Check</button>
    <div class="summary" id="summary"></div>
  </div>

  <div class="cycles" id="cycleList"></div>

  <div class="footer">
    HEAD requests proxied via Cloudflare Worker · zero data downloaded · all times Pacific
  </div>
</div>

<script>
const CYCLES = [
  { fxx: 48, initHour: 0,  dayOffset: -1, label: "00z D-1", expectedLatencyMin: 90 },
  { fxx: 42, initHour: 6,  dayOffset: -1, label: "06z D-1", expectedLatencyMin: 85 },
  { fxx: 36, initHour: 12, dayOffset: -1, label: "12z D-1", expectedLatencyMin: 90 },
  { fxx: 30, initHour: 18, dayOffset: -1, label: "18z D-1", expectedLatencyMin: 85 },
  { fxx: 24, initHour: 0,  dayOffset:  0, label: "00z D-0", expectedLatencyMin: 90 },
  { fxx: 18, initHour: 6,  dayOffset:  0, label: "06z D-0", expectedLatencyMin: 85 },
  { fxx: 12, initHour: 12, dayOffset:  0, label: "12z D-0", expectedLatencyMin: 90 },
];

const LS_KEY = 'nbm-worker-url';
const pad  = n => String(n).padStart(2, '0');
const pad3 = n => String(n).padStart(3, '0');

function nomadsUrl(dateStr, initHour, fxx) {
  const d = dateStr.replace(/-/g, '');
  return `https://nomads.ncep.noaa.gov/pub/data/nccf/com/blend/prod/blend.${d}/${pad(initHour)}/core/blend.t${pad(initHour)}z.core.f${pad3(fxx)}.co.grib2`;
}

function addDays(dateStr, n) {
  const d = new Date(dateStr + 'T00:00:00Z');
  d.setUTCDate(d.getUTCDate() + n);
  return d.toISOString().slice(0, 10);
}

function toLA_short(date) {
  return date.toLocaleString('en-US', {
    timeZone: 'America/Los_Angeles',
    hour: 'numeric', minute: '2-digit',
    hour12: true,
  });
}

function initTimeLA(targetDate, cycle) {
  const initDate = addDays(targetDate, cycle.dayOffset);
  const dt = new Date(initDate + 'T00:00:00Z');
  dt.setUTCHours(cycle.initHour);
  return dt.toLocaleString('en-US', {
    timeZone: 'America/Los_Angeles',
    month: 'short', day: 'numeric',
    hour: 'numeric', minute: '2-digit',
    hour12: true,
  });
}

function expectedTime(targetDate, cycle) {
  const initDate = addDays(targetDate, cycle.dayOffset);
  const dt = new Date(initDate + 'T00:00:00Z');
  dt.setUTCHours(cycle.initHour);
  dt.setUTCMinutes(cycle.expectedLatencyMin);
  return dt;
}

function getLADate(offsetDays) {
  const now = new Date();
  const laStr = now.toLocaleDateString('en-CA', { timeZone: 'America/Los_Angeles' });
  const d = new Date(laStr + 'T00:00:00');
  d.setDate(d.getDate() + offsetDays);
  return d.toISOString().slice(0, 10);
}

function fmtShortDate(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

function updateQuickButtons() {
  const val = document.getElementById('targetDate').value;
  const today = getLADate(0);
  const tomorrow = getLADate(1);
  document.getElementById('btnToday').textContent = `Today (${fmtShortDate(today)})`;
  document.getElementById('btnTomorrow').textContent = `Tomorrow (${fmtShortDate(tomorrow)})`;
  document.getElementById('btnToday').classList.toggle('active', val === today);
  document.getElementById('btnTomorrow').classList.toggle('active', val === tomorrow);
}

function setToday() {
  document.getElementById('targetDate').value = getLADate(0);
  updateQuickButtons();
}

function setTomorrow() {
  document.getElementById('targetDate').value = getLADate(1);
  updateQuickButtons();
}

document.getElementById('targetDate').addEventListener('change', updateQuickButtons);

function updateClock() {
  const now = new Date();
  const utc = now.toISOString().slice(0, 16).replace('T', ' ') + ' UTC';
  const la = now.toLocaleString('en-US', {
    timeZone: 'America/Los_Angeles',
    hour: 'numeric', minute: '2-digit', hour12: true,
  });
  document.getElementById('clock').textContent = `${utc} · ${la} LA`;
}

function loadWorkerUrl() {
  document.getElementById('workerUrl').value = localStorage.getItem(LS_KEY) || '';
}

function getWorkerUrl() {
  return document.getElementById('workerUrl').value.trim().replace(/\/+$/, '');
}

document.getElementById('workerUrl').addEventListener('input', () => {
  localStorage.setItem(LS_KEY, getWorkerUrl());
  const msg = document.getElementById('savedMsg');
  msg.style.opacity = '1';
  setTimeout(() => msg.style.opacity = '0', 1500);
});

async function checkSingle(nomadsTarget) {
  const worker = getWorkerUrl();
  if (!worker) return { ok: null, lastModified: null };
  try {
    const resp = await fetch(`${worker}/?url=${encodeURIComponent(nomadsTarget)}`);
    const data = await resp.json();
    return {
      ok: data.status === 200,
      lastModified: data.lastModified || null,
    };
  } catch {
    return { ok: null, lastModified: null };
  }
}

function renderRow(cycle, index, status, lastModified) {
  const target = document.getElementById('targetDate').value;
  const iDate = addDays(target, cycle.dayOffset);
  const expected = expectedTime(target, cycle);
  const initLA = initTimeLA(target, cycle);

  const statusMap = {
    ready:       '<span class="dot ready"></span>READY',
    unavailable: '<span class="dot unavailable"></span>NOT YET',
    checking:    '···',
    error:       'ERR',
  };

  const rowClass = status === 'error' ? 'unavailable' : status;
  const expectedLA = toLA_short(expected);

  let actualHTML = '—';
  if (lastModified) {
    const pubDate = new Date(lastModified);
    actualHTML = `<span class="val actual">${toLA_short(pubDate)}</span>`;
  }

  return `
    <div class="cycle-row ${rowClass} show" style="transition-delay: ${index * 60}ms">
      <div class="cycle-num">f${pad3(cycle.fxx)}</div>
      <div class="cycle-info">
        <div class="cycle-label">${cycle.label}</div>
        <div class="cycle-init">init ${iDate} ${pad(cycle.initHour)}Z (${initLA} LA)</div>
      </div>
      <div class="cycle-times">
        <div class="time-row">exp <span class="val">${expectedLA}</span></div>
        <div class="time-row">pub ${actualHTML}</div>
      </div>
      <div class="cycle-status ${status} ${status === 'checking' ? 'checking-anim' : ''}">${statusMap[status]}</div>
    </div>`;
}

async function runCheck() {
  const btn     = document.getElementById('checkBtn');
  const list    = document.getElementById('cycleList');
  const summary = document.getElementById('summary');
  const target  = document.getElementById('targetDate').value;
  const worker  = getWorkerUrl();

  if (!target) return;

  if (!worker) {
    list.innerHTML = '<div class="msg">Enter your Cloudflare Worker URL above first.</div>';
    return;
  }

  btn.classList.add('checking');
  btn.textContent = 'Checking';
  summary.innerHTML = '';
  list.innerHTML = CYCLES.map((c, i) => renderRow(c, i, 'checking', null)).join('');

  let readyCount = 0;

  for (let i = 0; i < CYCLES.length; i++) {
    const c = CYCLES[i];
    const iDate = addDays(target, c.dayOffset);
    const url = nomadsUrl(iDate, c.initHour, c.fxx);
    const result = await checkSingle(url);

    let status;
    if (result.ok === null) status = 'error';
    else if (result.ok) { status = 'ready'; readyCount++; }
    else status = 'unavailable';

    const rows = list.querySelectorAll('.cycle-row');
    rows[i].outerHTML = renderRow(c, i, status, result.lastModified);
  }

  summary.innerHTML = `<b>${readyCount}</b>/${CYCLES.length}`;
  btn.classList.remove('checking');
  btn.textContent = 'Check';
}

loadWorkerUrl();
setTomorrow();
updateClock();
setInterval(updateClock, 10000);
</script>
</body>
</html>
