<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CJM Экспресс-кредиты — Interview Bot</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0f0f0f;
    color: #e0e0e0;
    height: 100vh;
    overflow: hidden;
  }

  /* ===== LOGIN ===== */
  .login-screen {
    display: flex; align-items: center; justify-content: center;
    height: 100vh; background: #0f0f0f;
  }
  .login-box {
    background: #1a1a1a; border: 1px solid #2a2a2a;
    border-radius: 12px; padding: 32px; width: 360px;
  }
  .login-box h2 { font-size: 18px; color: #fff; margin-bottom: 4px; text-align: center; }
  .login-box .subtitle { font-size: 12px; color: #666; text-align: center; margin-bottom: 20px; }
  .login-box input {
    width: 100%; background: #111; border: 1px solid #333;
    color: #e0e0e0; padding: 10px 14px; border-radius: 8px;
    font-size: 14px; margin-bottom: 12px;
  }
  .login-box input:focus { outline: none; border-color: #1d4ed8; }
  .login-box button {
    width: 100%; background: #1d4ed8; color: #fff; border: none;
    padding: 10px; border-radius: 8px; font-size: 14px; cursor: pointer;
  }
  .login-box button:hover { background: #2563eb; }
  .login-box button:disabled { opacity: 0.4; cursor: not-allowed; }
  .login-error { color: #f87171; font-size: 12px; text-align: center; margin-top: 8px; min-height: 18px; }

  /* ===== APP ===== */
  .app { display: none; flex-direction: column; height: 100vh; }
  .app.visible { display: flex; }

  .header {
    padding: 10px 20px; background: #1a1a1a; border-bottom: 1px solid #2a2a2a;
    display: flex; align-items: center; gap: 12px; flex-shrink: 0;
  }
  .header h1 { font-size: 15px; font-weight: 600; color: #fff; }
  .header .badge {
    font-size: 10px; padding: 2px 8px; border-radius: 4px;
    background: #1e3a3a; color: #2dd4bf; text-transform: uppercase; letter-spacing: 0.5px;
  }
  .status {
    font-size: 11px; padding: 3px 8px; border-radius: 10px;
    background: #1e3a1e; color: #4ade80;
  }
  .status.error { background: #3a1e1e; color: #f87171; }
  .status.loading { background: #3a3a1e; color: #facc15; }
  .header-spacer { flex: 1; }
  .header-user { font-size: 12px; color: #666; }
  .toggle-debug-btn {
    background: #222; border: 1px solid #333; color: #888;
    padding: 5px 10px; border-radius: 6px; font-size: 11px; cursor: pointer; margin-left: 8px;
  }
  .toggle-debug-btn:hover { background: #333; color: #ccc; }

  .main-area { display: flex; flex: 1; overflow: hidden; }

  /* ===== GUIDE ===== */
  .guide-panel {
    width: 380px; background: #111; border-right: 1px solid #222;
    display: flex; flex-direction: column; flex-shrink: 0; overflow: hidden;
  }
  .guide-header {
    padding: 10px 14px; background: #1a1a1a; border-bottom: 1px solid #222;
  }
  .guide-header h3 { font-size: 12px; color: #888; text-transform: uppercase; letter-spacing: 1px; }
  .guide-content { flex: 1; overflow-y: auto; padding: 10px; }

  .guide-block { margin-bottom: 8px; background: #1a1a1a; border-radius: 8px; overflow: hidden; }
  .guide-block-title {
    padding: 8px 12px; background: #222; font-size: 12px; font-weight: 600; color: #ccc;
    cursor: pointer; display: flex; justify-content: space-between; align-items: center;
  }
  .guide-block-title:hover { background: #2a2a2a; }
  .guide-block-title .arrow { font-size: 10px; color: #666; transition: transform 0.2s; }
  .guide-block-title.open .arrow { transform: rotate(90deg); }
  .guide-block-desc {
    display: none; padding: 4px 12px 6px; font-size: 10px; color: #555; font-style: italic;
  }
  .guide-block-desc.open { display: block; }
  .guide-questions { display: none; padding: 0 10px 8px; }
  .guide-questions.open { display: block; }

  .guide-q {
    padding: 8px; margin-bottom: 6px; border-radius: 6px;
    background: #151515; border: 1px solid #222;
    transition: border-color 0.2s;
  }
  .guide-q.active { border-color: #4ade80; background: #111a14; }
  .guide-q-id {
    font-family: monospace; font-size: 10px; color: #555;
    display: inline-block; margin-bottom: 3px;
  }
  .guide-q-text { font-size: 11px; color: #bbb; line-height: 1.4; margin-bottom: 4px; }
  .guide-q-meta { font-size: 10px; line-height: 1.3; }
  .guide-q-hint { color: #6b8aab; margin-bottom: 2px; }
  .guide-q-style { color: #8b7a6b; }
  .guide-q-label {
    font-size: 9px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.3px; display: inline-block; margin-right: 4px;
  }
  .guide-q-label.hint-label { color: #4a6a8a; }
  .guide-q-label.style-label { color: #7a6a5a; }

  /* ===== CHAT ===== */
  .chat-panel { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  .messages {
    flex: 1; overflow-y: auto; padding: 20px;
    display: flex; flex-direction: column; gap: 12px;
  }
  .msg {
    max-width: 80%; padding: 10px 14px; border-radius: 12px;
    font-size: 14px; line-height: 1.5; word-wrap: break-word;
  }
  .msg.bot { align-self: flex-start; background: #1e293b; color: #e2e8f0; border-bottom-left-radius: 4px; }
  .msg.user { align-self: flex-end; background: #1d4ed8; color: #fff; border-bottom-right-radius: 4px; }
  .msg.system { align-self: center; background: transparent; color: #666; font-size: 12px; padding: 4px; }
  .msg.error-msg { align-self: center; background: #2a1515; color: #f87171; font-size: 12px; border: 1px solid #3a2020; }

  .typing {
    align-self: flex-start; padding: 10px 14px; background: #1e293b;
    border-radius: 12px; border-bottom-left-radius: 4px; display: none; margin: 0 20px;
  }
  .typing span {
    display: inline-block; width: 6px; height: 6px;
    background: #64748b; border-radius: 50%; margin: 0 2px; animation: bounce 1.2s infinite;
  }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }

  .input-area {
    padding: 12px 20px; background: #141414; border-top: 1px solid #222;
    display: flex; gap: 8px; flex-shrink: 0;
  }
  .input-area input {
    flex: 1; background: #1a1a1a; border: 1px solid #333;
    color: #e0e0e0; padding: 10px 14px; border-radius: 10px; font-size: 14px;
  }
  .input-area input:focus { outline: none; border-color: #1d4ed8; }
  .input-area input:disabled { opacity: 0.4; }
  .input-area button {
    background: #1d4ed8; color: #fff; border: none;
    padding: 10px 20px; border-radius: 10px; font-size: 14px; cursor: pointer;
  }
  .input-area button:hover { background: #2563eb; }
  .input-area button:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ===== DEBUG ===== */
  .debug-panel {
    width: 380px; background: #111; border-left: 1px solid #222;
    display: none; flex-direction: column; flex-shrink: 0;
  }
  .debug-panel.visible { display: flex; }
  .debug-header {
    padding: 10px 14px; background: #1a1a1a; border-bottom: 1px solid #222;
    display: flex; justify-content: space-between; align-items: center;
  }
  .debug-header h3 { font-size: 12px; color: #888; text-transform: uppercase; letter-spacing: 1px; }
  .debug-close {
    background: none; border: 1px solid #333; color: #888;
    padding: 2px 8px; border-radius: 4px; font-size: 10px; cursor: pointer;
  }
  .debug-content { flex: 1; overflow-y: auto; padding: 10px; }
  .debug-entry { margin-bottom: 10px; background: #1a1a1a; border-radius: 8px; overflow: hidden; }
  .debug-entry-header {
    padding: 6px 10px; background: #222; font-size: 11px; color: #888;
    cursor: pointer; display: flex; justify-content: space-between;
  }
  .debug-entry-header:hover { background: #2a2a2a; }
  .debug-entry-body {
    padding: 8px 10px; font-size: 11px; font-family: monospace; color: #aaa;
    white-space: pre-wrap; word-break: break-all; max-height: 300px; overflow-y: auto;
  }
  .debug-entry-body.collapsed { display: none; }
  .tag { font-size: 10px; padding: 1px 5px; border-radius: 3px; margin-left: 6px; }
  .tag.followup { background: #1e3a3a; color: #2dd4bf; }
  .tag.next { background: #1e1e3a; color: #818cf8; }
  .tag.end { background: #3a1e1e; color: #f87171; }
  .tag.ask { background: #1e3a1e; color: #4ade80; }

  /* Scrollbars */
  .messages::-webkit-scrollbar, .debug-content::-webkit-scrollbar,
  .debug-entry-body::-webkit-scrollbar, .guide-content::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-thumb, .debug-content::-webkit-scrollbar-thumb,
  .debug-entry-body::-webkit-scrollbar-thumb, .guide-content::-webkit-scrollbar-thumb {
    background: #333; border-radius: 2px;
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <h2>🎙AI Interviewer</h2>
    <div class="subtitle">AI Interview — Customer Journey Map</div>
    <input type="text" id="loginInput" placeholder="Логин" autofocus
           onkeydown="if(event.key==='Enter')document.getElementById('passInput').focus()" />
    <input type="password" id="passInput" placeholder="Пароль"
           onkeydown="if(event.key==='Enter')doLogin()" />
    <button id="loginBtn" onclick="doLogin()">Войти</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<!-- APP -->
<div class="app" id="app">
  <div class="header">
    <h1>🎙 CJM Экспресс-кредиты</h1>
    <span class="badge">Customer Journey Map</span>
    <span class="status" id="status">Ready</span>
    <div class="header-spacer"></div>
    <span class="header-user" id="headerUser"></span>
    <button class="toggle-debug-btn" onclick="toggleDebug()">{ } Dev</button>
  </div>

  <div class="main-area">
    <!-- GUIDE -->
    <div class="guide-panel">
      <div class="guide-header"><h3>📋 Гайд интервью (for researcher's reference)</h3></div>
      <div class="guide-content" id="guideContent"></div>
    </div>

    <!-- CHAT -->
    <div class="chat-panel">
      <div class="messages" id="messages"></div>
      <div class="typing" id="typing"><span></span><span></span><span></span></div>
      <div class="input-area">
        <input type="text" id="userInput" placeholder="Ваш ответ..."
               onkeydown="if(event.key==='Enter')sendMessage()" />
        <button id="sendBtn" onclick="sendMessage()">Отправить</button>
      </div>
    </div>

    <!-- DEBUG -->
    <div class="debug-panel" id="debugPanel">
      <div class="debug-header">
        <h3>Debug / Analysis</h3>
        <button class="debug-close" onclick="toggleDebug()">✕</button>
      </div>
      <div class="debug-content" id="debugContent"></div>
    </div>
  </div>
</div>

<script>
// ====== НАСТРОЙКИ ======
const WORKER_URL = "https://rough-truth-1d0d.misha6041.workers.dev";
const API_KEY = "";
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwaKkgk8eLrG9P0hXY7lgUwllw4zhumLuOnyrfriqy0bqlPzezJrE-enKbUJk0Yw3QP/exec";
const DEV_PASSWORD = "valley";
// ========================

let state = null;
let turnNumber = 0;
let currentLogin = "";
let debugUnlocked = false;

// ===== FULL GUIDE =====
const GUIDE_BLOCKS = [
  {
    id: "intro",
    title: "Вступление и контекст",
    description: "Знакомство, разогрев, общий контекст респондента",
    questions: [
      {
        id: "intro_q1",
        text: "Расскажите, пожалуйста, немного о себе — чем занимаетесь, какая у вас жизненная ситуация сейчас?",
        followup_hint: "Если ответ слишком общий, попроси конкретный пример из недавнего времени.",
        ask_style: "Разогрев/знакомство. НЕ ДАВИ на детали и не уводи к кредиту. Если респондент назвал профессию и жизненную ситуацию — этого достаточно, переходи дальше. Followup ТОЛЬКО если ответ совсем пустой (1-2 слова без контекста). Не уточняй детали профессии."
      },
      {
        id: "intro_q2",
        text: "Вспомните, пожалуйста, момент, когда вы поняли, что вам нужны деньги. Что происходило тогда?",
        followup_hint: "Спроси про эмоции, мысли в тот момент. Что было первым импульсом?",
        ask_style: "Нужен конкретный момент/эпизод. Зафиксируй контекст (когда/что случилось) и мягко добейся деталей. Уточняй эмоции/мысли и первый импульс. Не уходи в общие рассуждения."
      },
      {
        id: "intro_q3",
        text: "Почему вы решили взять именно кредит, а не, например, попросить у друзей или отложить покупку?",
        followup_hint: "Если звучит 'не было выбора', попроси описать, какие варианты вообще рассматривались.",
        ask_style: "Фокус на принятии решения. Выясни альтернативы и логику выбора. Если 'не было выбора' — добейся списка реально рассмотренных вариантов и причины отказа от них."
      }
    ]
  },
  {
    id: "search_discovery",
    title: "Поиск и выбор банка",
    description: "Как человек искал информацию, сравнивал варианты, принимал решение",
    questions: [
      {
        id: "search_q1",
        text: "Где вы начали искать информацию о кредитах? Что было первым шагом?",
        followup_hint: "Спроси, что конкретно вводили в поиске, какие сайты открыли первыми.",
        ask_style: "Начало CJM-цепочки. Восстанови хронологию: первый шаг -> что дальше. Проси конкретику (запросы, сайты, приложения, звонки). Не переходи к оценке условий, пока не выяснишь шаги."
      },
      {
        id: "search_q2",
        text: "Как вы выбирали между разными банками и предложениями? На что смотрели в первую очередь?",
        followup_hint: "Если называют процент/сумму, спроси, как сравнивали условия — в табличке, на глаз, через агрегатор?",
        ask_style: "Фокус на критериях выбора и способе сравнения. Проси конкретные критерии (ставка, срок, скорость, требования) и механизмы сравнения (агрегатор/таблица/консультация)."
      },
      {
        id: "search_q3",
        text: "Были ли какие-то банки или продукты, которые вы сразу отмели? Почему?",
        followup_hint: "Попроси вспомнить конкретное название или ситуацию, когда подумали 'это не подходит'.",
        ask_style: "Фокус на отсеивании. Добейся конкретных названий/примеров и причины отказа. Привяжи к моменту выбора (что увидели/услышали -> почему отмели)."
      },
      {
        id: "search_q4",
        text: "Как вы поняли, что именно этот банк/кредит — то, что нужно? Был ли момент 'точно, беру это'?",
        followup_hint: "Спроси, что стало решающим фактором — реклама, отзыв, условия, срочность?",
        ask_style: "Фокус на точке решения. Выясни триггер: что именно стало решающим и в какой момент. Проси 1–2 конкретных фактора и почему они перевесили остальные."
      },
      {
        id: "search_q5",
        text: "Читали ли вы отзывы о банке или кредитном продукте? Где и как искали?",
        followup_hint: "Если читали, спроси, какой отзыв запомнился и повлиял ли он на решение.",
        ask_style: "Фокус на влиянии социального доказательства. Выясни источники (сайты, карты, форумы) и конкретный отзыв/тезис, который повлиял или не повлиял."
      }
    ]
  },
  {
    id: "application",
    title: "Процесс подачи заявки",
    description: "Как заполняли, что чувствовали, какие сложности возникали",

      {

      },
      {
        id: "app_q2",
        text: "Были ли моменты, когда вы не понимали, что от вас хотят или зачем нужна какая-то информация?",
        followup_hint: "Спроси, как выходили из ситуации — гуглили, звонили в банк, просто пропускали?",
        ask_style: "Фокус на непонимании/когнитивной нагрузке. Проси конкретный пример поля/шага и что сделали, чтобы разобраться. Не уходи в общие жалобы без примера."
      },
      {
        id: "app_q3",
        text: "Что вы чувствовали, пока заполняли заявку? О чём думали?",

        ask_style: "Эмоции в процессе оформления. Привяжи эмоции к конкретному моменту/шагу. Уточняй, что именно вызвало тревогу/спокойствие и почему."
      },
      {
        id: "app_q4",
        text: "Сколько времени ушло на заполнение? Это было быстрее или дольше, чем вы ожидали?",
        followup_hint: "Спроси, что замедляло — технические проблемы, непонятные поля, поиск документов?",
        ask_style: "Фокус на времени и тормозах. Добейся оценки длительности и 1–2 причин задержек. Привяжи к конкретным шагам."
      },
      {
        id: "app_q5",
        text: "Нужно ли было загружать какие-то документы? Как это происходило?",

    ]
  },
  {

      {

      {

      {
        id: "wait_q4",

// ===== RENDER GUIDE =====
function renderGuide() {
  const container = document.getElementById('guideContent');
  container.innerHTML = '';
  GUIDE_BLOCKS.forEach((block, bi) => {
    const div = document.createElement('div');
    div.className = 'guide-block';
    div.setAttribute('data-block', bi);

    const title = document.createElement('div');
    title.className = 'guide-block-title';
    title.innerHTML = `<span>${bi + 1}. ${block.title}</span><span class="arrow">▶</span>`;

    const desc = document.createElement('div');
    desc.className = 'guide-block-desc';
    desc.textContent = block.description;

    const qs = document.createElement('div');
    qs.className = 'guide-questions';

    title.onclick = () => {
      title.classList.toggle('open');
      desc.classList.toggle('open');
      qs.classList.toggle('open');
    };

    block.questions.forEach(q => {
      const qd = document.createElement('div');
      qd.className = 'guide-q';
      qd.setAttribute('data-qid', q.id);
      qd.innerHTML = `
        <div class="guide-q-id">${q.id}</div>
        <div class="guide-q-text">${q.text}</div>
        <div class="guide-q-meta">
          <div class="guide-q-hint"><span class="guide-q-label hint-label">HINT:</span>${q.followup_hint}</div>
          <div class="guide-q-style"><span class="guide-q-label style-label">STYLE:</span>${q.ask_style}</div>
        </div>`;
      qs.appendChild(qd);
    });

    div.appendChild(title);
    div.appendChild(desc);
    div.appendChild(qs);
    container.appendChild(div);
  });
}

function updateGuideHighlight(blockIndex, questionIndex) {
  document.querySelectorAll('.guide-q').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.guide-block-title').forEach(el => el.classList.remove('open'));
  document.querySelectorAll('.guide-block-desc').forEach(el => el.classList.remove('open'));
  document.querySelectorAll('.guide-questions').forEach(el => el.classList.remove('open'));

  const block = document.querySelector(`.guide-block[data-block="${blockIndex}"]`);
  if (!block) return;
  const title = block.querySelector('.guide-block-title');
  const desc = block.querySelector('.guide-block-desc');
  const qs = block.querySelector('.guide-questions');
  if (title) title.classList.add('open');
  if (desc) desc.classList.add('open');
  if (qs) qs.classList.add('open');

  const questions = GUIDE_BLOCKS[blockIndex]?.questions || [];
  const qId = questions[questionIndex]?.id;
  if (qId) {
    const qEl = block.querySelector(`[data-qid="${qId}"]`);
    if (qEl) {
      qEl.classList.add('active');
      qEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
  }
}

// ===== AUTH =====
async function doLogin() {
  const login = document.getElementById('loginInput').value.trim();
  const pass = document.getElementById('passInput').value.trim();
  const err = document.getElementById('loginError');
  const btn = document.getElementById('loginBtn');
  if (!login || !pass) { err.textContent = 'Введите логин и пароль'; return; }
  btn.disabled = true;
  err.textContent = 'Проверяю...';
  try {
    const res = await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ action: 'auth', login, password: pass })
    });
    const data = await res.json();
    if (data.success) {
      currentLogin = login;
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('app').classList.add('visible');
      document.getElementById('headerUser').textContent = login;
      renderGuide();
      sendMessage();
    } else {
      err.textContent = 'Неверный логин или пароль';
    }
  } catch (e) {
    err.textContent = 'Ошибка соединения: ' + e.message;
  } finally {
    btn.disabled = false;
  }
}

// ===== DEBUG =====
function toggleDebug() {
  const panel = document.getElementById('debugPanel');
  if (!debugUnlocked) {
    const pwd = prompt('Пароль разработчика:');
    if (pwd !== DEV_PASSWORD) { alert('Неверный пароль'); return; }
    debugUnlocked = true;
  }
  panel.classList.toggle('visible');
}

function addDebugEntry(turn, data) {
  const container = document.getElementById('debugContent');
  const entry = document.createElement('div');
  entry.className = 'debug-entry';
  const action = data.llmAction || data.analysis?.decision?.action || '?';
  const tagClass = ['followup','next','end','ask'].includes(action) ? action : 'ask';
  const header = document.createElement('div');
  header.className = 'debug-entry-header';
  header.innerHTML = `<span>Turn ${turn}</span><span><span class="tag ${tagClass}">${action}</span></span>`;
  const body = document.createElement('div');
  body.className = 'debug-entry-body';
  const analysis = data.analysis || data.state?.lastAnalysis;
  let debugText = '';
  if (analysis) {
    const a = analysis.analysis || {};
    const d = analysis.decision || {};
    debugText += `📊 ANALYSIS\n`;
    debugText += `  type: ${a.answer_type||'?'}  depth: ${a.depth_score||'?'}/5\n`;
    debugText += `  covered: ${a.what_covered||'-'}\n`;
    debugText += `  missing: ${a.what_missing||'-'}\n`;
    debugText += `  cjm_gaps: ${a.cjm_gaps||'-'}\n`;
    debugText += `  emotions: ${a.emotional_signals||'-'}\n\n`;
    debugText += `🎯 DECISION\n`;
    debugText += `  action: ${d.action||'?'}\n`;
    debugText += `  reason: ${d.reasoning||'-'}\n`;
    debugText += `  probe: ${d.probe_target||'-'}\n\n`;
  }
  debugText += `📍 STATE\n`;
  debugText += `  block: ${data.state?.currentBlockIndex??'?'} q: ${data.state?.currentQuestionIndex??'?'}\n`;
  debugText += `  mode: ${data.state?.mode||'?'}\n`;
  debugText += `  pending: ${data.state?.pendingQuestionId||'-'}`;
  body.textContent = debugText;
  header.addEventListener('click', () => body.classList.toggle('collapsed'));
  entry.appendChild(header);
  entry.appendChild(body);
  container.insertBefore(entry, container.firstChild);
}

// ===== LOGGING =====
async function logToSheets(userMsg, data) {
  if (!APPS_SCRIPT_URL || APPS_SCRIPT_URL.includes('СЮДА')) return;
  try {
    await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({
        action: 'log',
        session_id: data.state?.sessionId || '',
        login: currentLogin,
        turn: turnNumber,
        user_message: userMsg,
        bot_reply: data.reply || data.llmReply || '',
        llm_action: data.llmAction || data.state?.lastAssistant?.action || '',
        analysis: data.analysis || data.state?.lastAnalysis || null,
        block_index: data.state?.currentBlockIndex ?? 0,
        question_index: data.state?.currentQuestionIndex ?? 0,
        pending_question: data.state?.pendingQuestionId || '',
        full_state: data.state || {}
      })
    });
  } catch (e) { console.warn('Log error:', e); }
}

// ===== CHAT =====
function setStatus(text, type = '') {
  const el = document.getElementById('status');
  el.textContent = text;
  el.className = 'status' + (type ? ' ' + type : '');
}
function addMessage(text, type = 'bot') {
  const messages = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg ' + type;
  div.textContent = text;
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}

async function sendMessage() {
  const input = document.getElementById('userInput');
  const btn = document.getElementById('sendBtn');
  const typing = document.getElementById('typing');
  const text = input.value.trim();
  if (text) addMessage(text, 'user');
  input.value = '';
  input.disabled = true;
  btn.disabled = true;
  typing.style.display = 'block';
  setStatus('Thinking...', 'loading');

  const payload = { user_message: text, session_id: 'sess_' + currentLogin + '_' + Date.now().toString(36) };
  if (state) payload.state = state;
  const headers = { 'Content-Type': 'application/json' };
  if (API_KEY) headers['X-API-Key'] = API_KEY;

  try {
    const startTime = Date.now();
    const response = await fetch(WORKER_URL, { method: 'POST', headers, body: JSON.stringify(payload) });
    const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);
    if (!response.ok) throw new Error(`HTTP ${response.status}: ${await response.text()}`);
    const data = await response.json();
    state = data.state || null;
    turnNumber++;
    addMessage(data.reply || data.llmReply || '(пустой ответ)', 'bot');
    addDebugEntry(turnNumber, data);
    setStatus(`${elapsed}s · Turn ${turnNumber}`);
    if (data.state) updateGuideHighlight(data.state.currentBlockIndex || 0, data.state.currentQuestionIndex || 0);
    logToSheets(text, data);
    if (data.state?.ended || data.state?.mode === 'end') {
      setStatus('Interview ended', 'error');
      addMessage('— Интервью завершено —', 'system');
    }
  } catch (err) {
    addMessage(`Ошибка: ${err.message}`, 'error-msg');
    setStatus('Error', 'error');
  } finally {
    typing.style.display = 'none';
    input.disabled = false;
    btn.disabled = false;
    input.focus();
  }
}
