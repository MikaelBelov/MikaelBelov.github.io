<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interview Bot Tester</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0f0f0f;
    color: #e0e0e0;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  .header {
    padding: 12px 20px;
    background: #1a1a1a;
    border-bottom: 1px solid #2a2a2a;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }

  .header h1 {
    font-size: 15px;
    font-weight: 600;
    color: #fff;
  }

  .status {
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 10px;
    background: #1e3a1e;
    color: #4ade80;
  }

  .status.error { background: #3a1e1e; color: #f87171; }
  .status.loading { background: #3a3a1e; color: #facc15; }

  .config-bar {
    padding: 8px 20px;
    background: #141414;
    border-bottom: 1px solid #222;
    display: flex;
    gap: 8px;
    align-items: center;
    flex-shrink: 0;
  }

  .config-bar label {
    font-size: 11px;
    color: #888;
    white-space: nowrap;
  }

  .config-bar input {
    flex: 1;
    background: #1a1a1a;
    border: 1px solid #333;
    color: #e0e0e0;
    padding: 5px 10px;
    border-radius: 6px;
    font-size: 12px;
    font-family: monospace;
  }

  .config-bar input:focus { outline: none; border-color: #555; }

  .config-bar select {
    background: #1a1a1a;
    border: 1px solid #333;
    color: #e0e0e0;
    padding: 5px 8px;
    border-radius: 6px;
    font-size: 12px;
  }

  .btn-reset {
    background: #2a1a1a;
    color: #f87171;
    border: 1px solid #3a2020;
    padding: 5px 12px;
    border-radius: 6px;
    font-size: 11px;
    cursor: pointer;
    white-space: nowrap;
  }

  .btn-reset:hover { background: #3a2020; }

  .main-area {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  .chat-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
  }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .msg {
    max-width: 80%;
    padding: 10px 14px;
    border-radius: 12px;
    font-size: 14px;
    line-height: 1.5;
    word-wrap: break-word;
  }

  .msg.bot {
    align-self: flex-start;
    background: #1e293b;
    color: #e2e8f0;
    border-bottom-left-radius: 4px;
  }

  .msg.user {
    align-self: flex-end;
    background: #1d4ed8;
    color: #fff;
    border-bottom-right-radius: 4px;
  }

  .msg.system {
    align-self: center;
    background: transparent;
    color: #666;
    font-size: 12px;
    padding: 4px;
  }

  .msg.error-msg {
    align-self: center;
    background: #2a1515;
    color: #f87171;
    font-size: 12px;
    border: 1px solid #3a2020;
  }

  .typing {
    align-self: flex-start;
    padding: 10px 14px;
    background: #1e293b;
    border-radius: 12px;
    border-bottom-left-radius: 4px;
    display: none;
  }

  .typing span {
    display: inline-block;
    width: 6px;
    height: 6px;
    background: #64748b;
    border-radius: 50%;
    margin: 0 2px;
    animation: bounce 1.2s infinite;
  }

  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-6px); }
  }

  .input-area {
    padding: 12px 20px;
    background: #141414;
    border-top: 1px solid #222;
    display: flex;
    gap: 8px;
    flex-shrink: 0;
  }

  .input-area input {
    flex: 1;
    background: #1a1a1a;
    border: 1px solid #333;
    color: #e0e0e0;
    padding: 10px 14px;
    border-radius: 10px;
    font-size: 14px;
  }

  .input-area input:focus { outline: none; border-color: #1d4ed8; }
  .input-area input:disabled { opacity: 0.4; }

  .input-area button {
    background: #1d4ed8;
    color: #fff;
    border: none;
    padding: 10px 20px;
    border-radius: 10px;
    font-size: 14px;
    cursor: pointer;
    white-space: nowrap;
  }

  .input-area button:hover { background: #2563eb; }
  .input-area button:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Debug panel */
  .debug-panel {
    width: 380px;
    background: #111;
    border-left: 1px solid #222;
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
  }

  .debug-panel.hidden { display: none; }

  .debug-header {
    padding: 10px 14px;
    background: #1a1a1a;
    border-bottom: 1px solid #222;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .debug-header h3 {
    font-size: 12px;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .debug-toggle {
    background: none;
    border: 1px solid #333;
    color: #888;
    padding: 3px 8px;
    border-radius: 4px;
    font-size: 10px;
    cursor: pointer;
  }

  .debug-content {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
  }

  .debug-entry {
    margin-bottom: 10px;
    background: #1a1a1a;
    border-radius: 8px;
    overflow: hidden;
  }

  .debug-entry-header {
    padding: 6px 10px;
    background: #222;
    font-size: 11px;
    color: #888;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
  }

  .debug-entry-header:hover { background: #2a2a2a; }

  .debug-entry-body {
    padding: 8px 10px;
    font-size: 11px;
    font-family: monospace;
    color: #aaa;
    white-space: pre-wrap;
    word-break: break-all;
    max-height: 300px;
    overflow-y: auto;
  }

  .debug-entry-body.collapsed { display: none; }

  .tag {
    font-size: 10px;
    padding: 1px 5px;
    border-radius: 3px;
    margin-left: 6px;
  }

  .tag.followup { background: #1e3a3a; color: #2dd4bf; }
  .tag.next { background: #1e1e3a; color: #818cf8; }
  .tag.end { background: #3a1e1e; color: #f87171; }

  .toggle-debug-btn {
    position: fixed;
    top: 12px;
    right: 12px;
    background: #222;
    border: 1px solid #333;
    color: #888;
    padding: 5px 10px;
    border-radius: 6px;
    font-size: 11px;
    cursor: pointer;
    z-index: 10;
  }

  .toggle-debug-btn:hover { background: #333; color: #ccc; }

  .messages::-webkit-scrollbar,
  .debug-content::-webkit-scrollbar,
  .debug-entry-body::-webkit-scrollbar { width: 4px; }
  
  .messages::-webkit-scrollbar-thumb,
  .debug-content::-webkit-scrollbar-thumb,
  .debug-entry-body::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
</style>
</head>
<body>

<div class="header">
  <h1>🎙 Interview Bot Tester</h1>
  <span class="status" id="status">Ready</span>
</div>

<div class="config-bar">
  <label>URL:</label>
  <input type="text" id="webhookUrl" value="http://localhost:5678/webhook/45fb5556-3a0b-4ee6-932b-d6a28ba204b5" />
  <select id="mode">
    <option value="production">Production</option>
    <option value="test" selected>Test</option>
  </select>
  <button class="btn-reset" onclick="resetSession()">⟳ Reset</button>
</div>

<button class="toggle-debug-btn" onclick="toggleDebug()">{ } Debug</button>

<div class="main-area">
  <div class="chat-panel">
    <div class="messages" id="messages">
      <div class="msg system">Нажми «Отправить» с пустым сообщением для старта интервью</div>
    </div>
    <div class="typing" id="typing">
      <span></span><span></span><span></span>
    </div>
    <div class="input-area">
      <input type="text" id="userInput" placeholder="Ваш ответ..." autofocus 
             onkeydown="if(event.key==='Enter')sendMessage()" />
      <button id="sendBtn" onclick="sendMessage()">Отправить</button>
    </div>
  </div>

  <div class="debug-panel" id="debugPanel">
    <div class="debug-header">
      <h3>Debug / Analysis</h3>
    </div>
    <div class="debug-content" id="debugContent"></div>
  </div>
</div>

<script>
let state = null;
let turnNumber = 0;

const modeSelect = document.getElementById('mode');
const urlInput = document.getElementById('webhookUrl');

// Auto-switch URL between test and production
modeSelect.addEventListener('change', () => {
  const base = urlInput.value;
  if (modeSelect.value === 'test') {
    urlInput.value = base.replace('/webhook/', '/webhook-test/');
  } else {
    urlInput.value = base.replace('/webhook-test/', '/webhook/');
  }
});

// Init: set to test mode URL
urlInput.value = urlInput.value.replace('/webhook/', '/webhook-test/');

function getWebhookUrl() {
  return urlInput.value.trim();
}

function setStatus(text, type = '') {
  const el = document.getElementById('status');
  el.textContent = text;
  el.className = 'status' + (type ? ' ' + type : '');
}

function addMessage(text, type = 'bot') {
  const messages = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg ' + type;
  div.textContent = text;
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}

function addDebugEntry(turn, data) {
  const container = document.getElementById('debugContent');
  
  const entry = document.createElement('div');
  entry.className = 'debug-entry';
  
  const action = data.llmAction || data.analysis?.decision?.action || '?';
  const tagClass = action === 'followup' ? 'followup' : action === 'next' ? 'next' : 'end';
  
  const header = document.createElement('div');
  header.className = 'debug-entry-header';
  header.innerHTML = `
    <span>Turn ${turn}</span>
    <span><span class="tag ${tagClass}">${action}</span></span>
  `;
  
  const body = document.createElement('div');
  body.className = 'debug-entry-body';
  
  // Format nicely
  const analysis = data.analysis || data.state?.lastAnalysis;
  let debugText = '';
  
  if (analysis) {
    const a = analysis.analysis || {};
    const d = analysis.decision || {};
    debugText += `📊 ANALYSIS\n`;
    debugText += `  type: ${a.answer_type || '?'}  depth: ${a.depth_score || '?'}/5\n`;
    debugText += `  covered: ${a.what_covered || '-'}\n`;
    debugText += `  missing: ${a.what_missing || '-'}\n`;
    debugText += `  emotions: ${a.emotional_signals || '-'}\n\n`;
    debugText += `🎯 DECISION\n`;
    debugText += `  action: ${d.action || '?'}\n`;
    debugText += `  reason: ${d.reasoning || '-'}\n`;
    debugText += `  probe: ${d.probe_target || '-'}\n\n`;
  }
  
  debugText += `📍 STATE\n`;
  debugText += `  block: ${data.state?.currentBlockIndex ?? '?'} q: ${data.state?.currentQuestionIndex ?? '?'}\n`;
  debugText += `  mode: ${data.state?.mode || '?'}\n`;
  debugText += `  pending: ${data.state?.pendingQuestionId || '-'}`;
  
  body.textContent = debugText;
  
  header.addEventListener('click', () => {
    body.classList.toggle('collapsed');
  });
  
  entry.appendChild(header);
  entry.appendChild(body);
  container.insertBefore(entry, container.firstChild);
}

function toggleDebug() {
  document.getElementById('debugPanel').classList.toggle('hidden');
}

function resetSession() {
  state = null;
  turnNumber = 0;
  document.getElementById('messages').innerHTML = '<div class="msg system">Сессия сброшена. Отправь пустое сообщение для старта.</div>';
  document.getElementById('debugContent').innerHTML = '';
  setStatus('Ready');
}

async function sendMessage() {
  const input = document.getElementById('userInput');
  const btn = document.getElementById('sendBtn');
  const typing = document.getElementById('typing');
  
  const text = input.value.trim();
  
  if (text) {
    addMessage(text, 'user');
  }
  
  input.value = '';
  input.disabled = true;
  btn.disabled = true;
  typing.style.display = 'block';
  setStatus('Thinking...', 'loading');
  
  const payload = {
    user_message: text,
    session_id: 'test_' + Date.now().toString(36)
  };
  
  if (state) {
    payload.state = state;
  }
  
  try {
    const startTime = Date.now();
    
    const response = await fetch(getWebhookUrl(), {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    
    const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);
    
    if (!response.ok) {
      throw new Error(`HTTP ${response.status}: ${response.statusText}`);
    }
    
    const data = await response.json();
    
    state = data.state || null;
    turnNumber++;
    
    const reply = data.reply || data.llmReply || '(пустой ответ)';
    addMessage(reply, 'bot');
    addDebugEntry(turnNumber, data);
    
    setStatus(`${elapsed}s · Turn ${turnNumber}`);
    
    if (data.state?.ended || data.state?.mode === 'end') {
      setStatus('Interview ended', 'error');
      addMessage('— Интервью завершено —', 'system');
    }
    
  } catch (err) {
    addMessage(`Ошибка: ${err.message}`, 'error-msg');
    setStatus('Error', 'error');
  } finally {
    typing.style.display = 'none';
    input.disabled = false;
    btn.disabled = false;
    input.focus();
  }
}
</script>

</body>
</html>
